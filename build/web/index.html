    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Jost:wght@400;500&family=Marcellus&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: Georgia, serif;
        }

        :root {
          --paper: #FFFFFF;
          --cream: #FEF6F2;
          --ribbon-pale: #EFC9C2;
          --ribbon: #A83A34;
          --ribbon-deep: #7E2620;
          --gold: #C9A15A;
          --ink-soft: #6B3B33;
        }

        #loading {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          text-align: center;
          background: radial-gradient(120% 100% at 50% 0%, var(--cream) 0%, var(--paper) 70%);
          z-index: 9999;
          transition: opacity 0.7s ease;
          padding: 24px;
        }

        #loading.hide {
          opacity: 0;
          pointer-events: none;
        }

        .eyebrow {
          font-family: 'Marcellus', Georgia, serif;
          font-size: 13px;
          letter-spacing: 2.2px;
          color: var(--ribbon);
          opacity: 0;
          animation: fadeInUp 0.9s ease forwards 0.2s;
        }

        .locket-wrap {
          width: 280px;
          height: 280px;
          margin-top: 14px;
          margin-bottom: 10px;
          position: relative;
          opacity: 0;
          animation: lockletIn 1.1s cubic-bezier(.22,1,.36,1) forwards 0.45s;
        }

        .locket-wrap::before {
          content: "";
          position: absolute;
          inset: -22px;
          border-radius: 50%;
          background: radial-gradient(circle, var(--ribbon-pale) 0%, transparent 70%);
          opacity: 0.7;
          animation: glowPulse 2.4s ease-in-out infinite;
        }

        .locket-wrap img {
          position: relative;
          width: 100%;
          height: 100%;
          object-fit: contain;
          filter: drop-shadow(0 10px 18px rgba(126,46,40,0.25));
        }

        .names {
          font-family: 'Italianno', cursive;
          font-size: clamp(44px, 11vw, 68px);
          line-height: 1;
          color: var(--ribbon);
          margin-top: 2px;
          opacity: 0;
          animation: fadeInUp 1s ease forwards 0.9s;
        }

        .amp {
          font-family: 'Italianno', cursive;
          font-size: clamp(22px, 5vw, 30px);
          color: var(--ribbon);
          display: block;
          margin: -4px 0;
          opacity: 0;
          animation: fadeInUp 1s ease forwards 1.05s;
        }

        .loading-label {
          font-family: 'Jost', Georgia, serif;
          font-weight: 500;
          font-size: 12px;
          letter-spacing: 3px;
          color: var(--ink-soft);
          margin-top: 26px;
          opacity: 0;
          animation: fadeInUp 0.8s ease forwards 1.4s;
        }

        .loading-label span {
          display: inline-block;
          animation: dotPulse 1.4s infinite ease-in-out;
        }
        .loading-label span:nth-child(2) { animation-delay: 0.2s; }
        .loading-label span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(16px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes lockletIn {
          from { opacity: 0; transform: translateY(10px) scale(0.88); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glowPulse {
          0%, 100% { opacity: 0.5; transform: scale(0.96); }
          50%      { opacity: 0.85; transform: scale(1.05); }
        }

        @media (prefers-reduced-motion: reduce) {
          .eyebrow, .names, .amp, .locket-wrap, .loading-label {
            animation: none;
            opacity: 1;
          }
          .locket-wrap::before { animation: none; }
        }
    </style>
</head>

<body>

<div id="loading">
    <div class="eyebrow">YOU'RE INVITED TO THE WEDDING OF</div>

    <div class="locket-wrap">
        <img src="assets/images/1.png" alt="Andrew and Diana">
    </div>

    <div class="names">Andrew<span class="amp">&amp;</span>Diana</div>

    <div class="loading-label">
        loading<span>.</span><span>.</span><span>.</span>
    </div>
</div>

<script src="flutter_bootstrap.js" async></script>

<script>
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = null;
    }
</script>

<script>
    const splashStartTime = Date.now();
    const minSplashDuration = 2000;

    let splashHidden = false;

    function hideSplash() {
        if (splashHidden) return;
        splashHidden = true;

        const elapsed = Date.now() - splashStartTime;
        const remainingTime = Math.max(0, minSplashDuration - elapsed);

        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (!loading) return;
            loading.classList.add('hide');
            setTimeout(() => loading.remove(), 750);
        }, remainingTime);
    }

    window.addEventListener('flutter-first-frame', () => {
        hideSplash();
    });

    // Safety net: لو flutter-first-frame مجاش بعد 8 ثواني
    setTimeout(() => {
        hideSplash();
    }, 8000);
</script>

</body>
</html>
